name: Publish

# HARD RULE: never publish manually. Bump VERSION, push to main, and this
# workflow tags the release. Swift Package Index auto-indexes any tagged
# commit (one-time submission at swiftpackageindex.com).
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: macos-14
    permissions:
      contents: write  # to push tags
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }

      - run: swift test

      - name: Read VERSION
        id: ver
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Tag if new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
