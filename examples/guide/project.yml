name: Guide

options:
  bundleIdPrefix: ai.shipeasy
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Guide:
    # A single multiplatform target — runs on an iPhone/iOS Simulator AND on
    # "My Mac". Pick the destination in Xcode's run-destination menu.
    type: application
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "16.0"
      macOS: "13.0"
    sources:
      - path: Guide
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.shipeasy.guide
        PRODUCT_NAME: Guide
        # Allow the SwiftUI app to run unsigned on a local Mac/Simulator.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ENABLE_PREVIEWS: YES
